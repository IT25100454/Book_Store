<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org" th:replace="~{layout/base :: html(title='Order Confirmation', content=~{::content})}">
<body>
    <div th:fragment="content" class="bg-gray-50 min-h-[calc(100vh-140px)] flex items-center justify-center py-12 px-4 sm:px-6 lg:px-8">
        <div class="max-w-md w-full bg-white rounded-xl shadow-xl border border-gray-100 p-8 text-center" data-aos="zoom-in">
            <div class="mx-auto flex items-center justify-center h-20 w-20 rounded-full bg-green-100 mb-6 shadow-inner">
                <i class="fa-solid fa-check text-4xl text-accent"></i>
            </div>
            <h2 class="text-3xl font-extrabold text-gray-900 mb-2">Order Confirmed!</h2>
            <p class="text-gray-600 mb-6">Thank you for your purchase. Your order has been placed successfully.</p>
            
            <div class="bg-gray-50 rounded-lg p-4 mb-8 border border-gray-200">
                <p class="text-sm text-gray-500 uppercase tracking-wider mb-1">Order Number</p>
                <p class="text-xl font-bold text-primary tracking-widest" th:text="${orderNumber}">ABC12345</p>
            </div>
            
            <div class="flex flex-col space-y-3">
                <a th:href="@{/profile}" class="w-full inline-flex justify-center items-center px-4 py-2 border border-transparent text-sm font-medium rounded-md shadow-sm text-white bg-primary hover:bg-blue-700 transition">
                    View Order Details
                </a>
                <a th:href="@{/books}" class="w-full inline-flex justify-center items-center px-4 py-2 border border-gray-300 text-sm font-medium rounded-md text-gray-700 bg-white hover:bg-gray-50 transition">
                    Continue Shopping
                </a>
            </div>
        </div>
    </div>
</body>
</html>
