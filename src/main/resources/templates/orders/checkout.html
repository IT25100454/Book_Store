<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org" th:replace="~{layout/base :: html(title='Checkout', content=~{::content})}">
<body>
    <div th:fragment="content" class="editorial-shell py-16 lg:py-24">
        <div class="mx-auto max-w-5xl" data-aos="fade-up">
            <p class="section-kicker">Checkout</p>
            <h1 class="editorial-heading mt-6">Confirm the delivery.</h1>

            <form th:action="@{/checkout/process}" method="post" class="glass-panel mt-12 p-7 md:p-10">
                <div class="grid gap-10 lg:grid-cols-[1.2fr_0.8fr]">
                    <div>
                        <h2 class="font-serif text-4xl font-black text-primary">Shipping information</h2>
                        <div class="mt-8 grid gap-6 md:grid-cols-2">
                            <div>
                                <label class="mb-2 block text-xs font-black uppercase tracking-[0.16em] text-[#716b61]">Full Name</label>
                                <input type="text" readonly th:value="${user.name}" class="premium-input w-full px-4 opacity-75">
                            </div>
                            <div>
                                <label class="mb-2 block text-xs font-black uppercase tracking-[0.16em] text-[#716b61]">Email Address</label>
                                <input type="email" readonly th:value="${user.email}" class="premium-input w-full px-4 opacity-75">
                            </div>
                            <div class="md:col-span-2">
                                <label for="shippingAddress" class="mb-2 block text-xs font-black uppercase tracking-[0.16em] text-[#716b61]">Shipping Address</label>
                                <textarea id="shippingAddress" name="shippingAddress" rows="5" required class="premium-input w-full px-4 py-3" th:text="${user.address}"></textarea>
                            </div>
                        </div>
                    </div>

                    <aside class="border-t border-black/10 pt-8 lg:border-l lg:border-t-0 lg:pl-8 lg:pt-0">
                        <h2 class="font-serif text-4xl font-black text-primary">Payment</h2>
                        <div class="mt-7 border border-black/10 bg-paper p-5">
                            <i class="fa-solid fa-circle-info text-accent"></i>
                            <p class="mt-3 text-sm leading-6 text-[#5f584d]">No payment details are required. Your order will be processed as payment on delivery.</p>
                        </div>
                        <div class="mt-8 border-t border-black/10 pt-7">
                            <p class="text-xs font-black uppercase tracking-[0.16em] text-[#716b61]">Total amount</p>
                            <p class="mt-2 text-4xl font-black text-primary" th:text="${'Rs. ' + #numbers.formatDecimal(total, 1, 2)}">Rs. 0.00</p>
                        </div>
                        <button type="submit" class="editorial-button mt-8 w-full">Confirm order</button>
                    </aside>
                </div>
            </form>
        </div>
    </div>
</body>
</html>
