<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org" th:replace="~{layout/base :: html(title='Register', content=~{::content})}">
<body>
    <div th:fragment="content" class="editorial-shell py-16 lg:py-24">
        <div class="mx-auto grid max-w-6xl gap-12 lg:grid-cols-[0.85fr_1.15fr] lg:items-start">
            <div data-aos="fade-up">
                <p class="section-kicker">Create account</p>
                <h1 class="editorial-heading mt-6">Start your private shelf.</h1>
                <p class="mt-6 text-lg leading-8 text-[#716b61]">Already registered? <a th:href="@{/login}" class="font-black text-accent">Log in here</a>.</p>
            </div>
            <form class="glass-panel grid gap-5 p-7 md:grid-cols-2 md:p-10" th:action="@{/register}" method="POST" th:object="${user}" data-aos="fade-up" data-aos-delay="100">
                <div th:if="${error}" class="border-l-4 border-red-700 bg-red-50 p-4 text-sm font-semibold text-red-700 md:col-span-2" th:text="${error}"></div>
                <div>
                    <label for="name" class="mb-2 block text-xs font-black uppercase tracking-[0.16em] text-[#716b61]">Full Name</label>
                    <input id="name" th:field="*{name}" type="text" required class="premium-input w-full px-4">
                </div>
                <div>
                    <label for="email" class="mb-2 block text-xs font-black uppercase tracking-[0.16em] text-[#716b61]">Email Address</label>
                    <input id="email" th:field="*{email}" type="email" required class="premium-input w-full px-4">
                </div>
                <div>
                    <label for="username" class="mb-2 block text-xs font-black uppercase tracking-[0.16em] text-[#716b61]">Username</label>
                    <input id="username" th:field="*{username}" type="text" required class="premium-input w-full px-4">
                </div>
                <div>
                    <label for="password" class="mb-2 block text-xs font-black uppercase tracking-[0.16em] text-[#716b61]">Password</label>
                    <input id="password" th:field="*{password}" type="password" required class="premium-input w-full px-4">
                </div>
                <div>
                    <label for="confirmPassword" class="mb-2 block text-xs font-black uppercase tracking-[0.16em] text-[#716b61]">Confirm Password</label>
                    <input id="confirmPassword" name="confirmPassword" type="password" required class="premium-input w-full px-4">
                </div>
                <div>
                    <label for="address" class="mb-2 block text-xs font-black uppercase tracking-[0.16em] text-[#716b61]">Shipping Address</label>
                    <textarea id="address" th:field="*{address}" rows="3" class="premium-input w-full px-4 py-3"></textarea>
                </div>
                <button type="submit" class="editorial-button md:col-span-2">Register account</button>
            </form>
        </div>
    </div>
</body>
</html>
