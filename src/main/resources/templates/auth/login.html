<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org" th:replace="~{layout/base :: html(title='Login', content=~{::content})}">
<body>
    <div th:fragment="content" class="editorial-shell grid min-h-[calc(100vh-76px)] items-center py-16 lg:grid-cols-[1fr_480px] lg:py-24">
        <div class="hidden pr-12 lg:block" data-aos="fade-up">
            <p class="section-kicker">Member access</p>
            <h1 class="display-title mt-7">Return to the shelves.</h1>
        </div>
        <div class="glass-panel p-7 md:p-10" data-aos="fade-up" data-aos-delay="100">
            <h2 class="font-serif text-5xl font-black text-primary">Sign in</h2>
            <p class="mt-3 text-[#716b61]">New here? <a th:href="@{/register}" class="font-black text-accent">Create an account</a></p>

            <div th:if="${param.error}" class="mt-6 border-l-4 border-red-700 bg-red-50 p-4 text-sm font-semibold text-red-700">Invalid username or password.</div>
            <div th:if="${success}" class="mt-6 border-l-4 border-green-700 bg-green-50 p-4 text-sm font-semibold text-green-700" th:text="${success}"></div>
            <div th:if="${param.accountDeleted}" class="mt-6 border-l-4 border-green-700 bg-green-50 p-4 text-sm font-semibold text-green-700">Your account has been successfully deleted.</div>
            <div th:if="${param.passwordChanged}" class="mt-6 border-l-4 border-green-700 bg-green-50 p-4 text-sm font-semibold text-green-700">Password changed successfully. Please log in with your new password.</div>

            <form class="mt-8 space-y-6" th:action="@{/login}" method="POST">
                <div>
                    <label for="username" class="mb-2 block text-xs font-black uppercase tracking-[0.16em] text-[#716b61]">Username</label>
                    <input id="username" name="username" type="text" required class="premium-input w-full px-4" placeholder="Username">
                </div>
                <div>
                    <label for="password" class="mb-2 block text-xs font-black uppercase tracking-[0.16em] text-[#716b61]">Password</label>
                    <input id="password" name="password" type="password" required class="premium-input w-full px-4" placeholder="Password">
                </div>
                <button type="submit" class="editorial-button w-full"><i class="fa-solid fa-arrow-right-to-bracket"></i> Sign in</button>
            </form>
        </div>
    </div>
</body>
</html>
