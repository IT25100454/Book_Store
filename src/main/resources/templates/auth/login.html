<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org" th:replace="~{layout/base :: html(title='Login', content=~{::content})}">
<body>
    <div th:fragment="content" class="min-h-[calc(100vh-140px)] flex items-center justify-center py-12 px-4 sm:px-6 lg:px-8 bg-gray-50">
        <div class="max-w-md w-full space-y-8 bg-white p-10 rounded-xl shadow-xl border border-gray-100" data-aos="fade-up">
            <div>
                <div class="mx-auto h-12 w-12 bg-blue-100 text-primary rounded-full flex items-center justify-center">
                    <i class="fa-solid fa-user-lock text-2xl"></i>
                </div>
                <h2 class="mt-6 text-center text-3xl font-extrabold text-gray-900">
                    Welcome Back
                </h2>
                <p class="mt-2 text-center text-sm text-gray-600">
                    Or <a th:href="@{/register}" class="font-medium text-primary hover:text-blue-800 transition">create a new account</a>
                </p>
            </div>
            
            <div th:if="${param.error}" class="bg-red-50 border-l-4 border-red-500 p-4 mb-4">
                <div class="flex">
                    <div class="flex-shrink-0">
                        <i class="fa-solid fa-circle-exclamation text-red-500"></i>
                    </div>
                    <div class="ml-3">
                        <p class="text-sm text-red-700">Invalid username or password.</p>
                    </div>
                </div>
            </div>
            
            <div th:if="${success}" class="bg-green-50 border-l-4 border-green-500 p-4 mb-4">
                <p class="text-sm text-green-700" th:text="${success}"></p>
            </div>

            <div th:if="${param.accountDeleted}" class="bg-green-100 border-l-4 border-green-400 text-green-700 p-4 mb-4">
                <p class="text-sm">Your account has been successfully deleted. We're sorry to see you go.</p>
            </div>

            <div th:if="${param.passwordChanged}" class="bg-green-100 border-l-4 border-green-400 text-green-700 p-4 mb-4">
                <p class="text-sm">Password changed successfully. Please log in with your new password.</p>
            </div>

            <form class="mt-8 space-y-6" th:action="@{/login}" method="POST">
                <div class="rounded-md shadow-sm space-y-4">
                    <div>
                        <label for="username" class="block text-sm font-medium text-gray-700">Username</label>
                        <input id="username" name="username" type="text" required class="appearance-none relative block w-full px-3 py-2 border border-gray-300 placeholder-gray-500 text-gray-900 rounded-md focus:outline-none focus:ring-primary focus:border-primary focus:z-10 sm:text-sm mt-1" placeholder="Username">
                    </div>
                    <div>
                        <label for="password" class="block text-sm font-medium text-gray-700">Password</label>
                        <input id="password" name="password" type="password" required class="appearance-none relative block w-full px-3 py-2 border border-gray-300 placeholder-gray-500 text-gray-900 rounded-md focus:outline-none focus:ring-primary focus:border-primary focus:z-10 sm:text-sm mt-1" placeholder="Password">
                    </div>
                </div>

                <div>
                    <button type="submit" class="group relative w-full flex justify-center py-2.5 px-4 border border-transparent text-sm font-medium rounded-md text-white bg-primary hover:bg-blue-700 focus:outline-none focus:ring-2 focus:ring-offset-2 focus:ring-primary transition shadow-md">
                        <span class="absolute left-0 inset-y-0 flex items-center pl-3">
                            <i class="fa-solid fa-arrow-right-to-bracket text-blue-300 group-hover:text-blue-200"></i>
                        </span>
                        Sign in
                    </button>
                </div>
            </form>
        </div>
    </div>
</body>
</html>
