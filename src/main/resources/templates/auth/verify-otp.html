<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org" th:replace="~{layout/base :: html(title='Verify Email', content=~{::content})}">
<body>
    <div th:fragment="content" class="min-h-[calc(100vh-140px)] flex items-center justify-center py-12 px-4 sm:px-6 lg:px-8 bg-gray-50">
        <div class="max-w-md w-full space-y-8 bg-white p-10 rounded-xl shadow-xl border border-gray-100" data-aos="fade-up">
            <div class="text-center">
                <div class="mx-auto h-12 w-12 bg-blue-100 text-primary rounded-full flex items-center justify-center mb-4">
                    <i class="fa-solid fa-envelope-open-text text-2xl"></i>
                </div>
                <h2 class="text-3xl font-extrabold text-gray-900">Check your email</h2>
                <p class="mt-2 text-sm text-gray-600">
                    We've sent a 6-digit verification code to <br>
                    <span th:text="${email}" class="font-bold text-gray-800"></span>
                </p>
            </div>
            
            <div th:if="${error}" class="bg-red-50 border-l-4 border-red-500 p-4 mb-4 rounded-md">
                <p class="text-sm text-red-700" th:text="${error}"></p>
            </div>
            <div th:if="${success}" class="bg-green-50 border-l-4 border-accent p-4 mb-4 rounded-md">
                <p class="text-sm text-green-700" th:text="${success}"></p>
            </div>

            <form class="mt-8 space-y-6" th:action="@{/verify-otp}" method="POST">
                <input type="hidden" name="email" th:value="${email}" />
                
                <div>
                    <label for="otp" class="sr-only">Verification Code</label>
                    <input id="otp" name="otp" type="text" pattern="\d{6}" maxlength="6" required title="Please enter exactly 6 digits" placeholder="Enter 6-digit code" class="appearance-none rounded-md block w-full px-3 py-4 border border-gray-300 placeholder-gray-400 text-gray-900 focus:outline-none focus:ring-primary focus:border-primary text-center text-2xl tracking-[0.5em] font-bold shadow-sm">
                </div>

                <div>
                    <button type="submit" class="w-full flex justify-center py-3 px-4 border border-transparent rounded-md shadow-sm text-sm font-bold text-white bg-primary hover:bg-blue-700 focus:outline-none focus:ring-2 focus:ring-offset-2 focus:ring-primary transition">
                        Verify Account
                    </button>
                </div>
            </form>
            
            <form th:action="@{/resend-otp}" method="POST" class="mt-4 text-center">
                <input type="hidden" name="email" th:value="${email}" />
                <p class="text-sm text-gray-600">
                    Didn't receive the code? 
                    <button type="submit" class="font-medium text-accent hover:text-green-700 bg-transparent border-0 cursor-pointer p-0 transition">
                        Resend OTP
                    </button>
                </p>
            </form>
        </div>
    </div>
</body>
</html>
