<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org" th:replace="~{layout/base :: html(title='Manage Books', content=~{::content})}">
<body>
    <div th:fragment="content" class="flex min-h-[calc(100vh-64px)] bg-gray-50">
        <aside th:replace="~{admin/layout :: sidebar}"></aside>
        <main class="flex-1 w-full overflow-x-hidden p-8">
            <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8" data-aos="fade-up">
            <div class="flex flex-col md:flex-row justify-between items-center mb-8 gap-4">
                <div class="flex items-center gap-3">
                    <a th:href="@{/admin}" class="text-gray-400 hover:text-primary transition"><i class="fa-solid fa-arrow-left"></i></a>
                    <h1 class="text-3xl font-extrabold text-gray-900">Manage Books</h1>
                </div>
                <a th:href="@{/admin/books/add}" class="bg-primary hover:bg-blue-700 text-white px-4 py-2 rounded-md font-medium transition shadow-sm inline-flex items-center gap-2">
                    <i class="fa-solid fa-plus"></i> Add New Book
                </a>
            </div>

            <div class="bg-white rounded-xl shadow border border-gray-100 overflow-hidden">
                <div class="overflow-x-auto">
                    <table class="min-w-full divide-y divide-gray-200">
                        <thead class="bg-gray-50">
                            <tr>
                                <th scope="col" class="px-6 py-3 text-left text-xs font-medium text-gray-500 uppercase tracking-wider">Book</th>
                                <th scope="col" class="px-6 py-3 text-left text-xs font-medium text-gray-500 uppercase tracking-wider">ISBN/Genre</th>
                                <th scope="col" class="px-6 py-3 text-left text-xs font-medium text-gray-500 uppercase tracking-wider">Price</th>
                                <th scope="col" class="px-6 py-3 text-left text-xs font-medium text-gray-500 uppercase tracking-wider">Stock</th>
                                <th scope="col" class="px-6 py-3 text-right text-xs font-medium text-gray-500 uppercase tracking-wider">Actions</th>
                            </tr>
                        </thead>
                        <tbody class="bg-white divide-y divide-gray-200">
                            <tr th:each="book : ${books}" class="hover:bg-gray-50 transition">
                                <td class="px-6 py-4 whitespace-nowrap">
                                    <div class="flex items-center">
                                        <div class="flex-shrink-0 h-10 w-8">
                                            <img class="h-10 w-full object-cover rounded shadow-sm" th:src="${book.coverUrl}" alt="" onerror="this.src='/images/book-placeholder.png'">
                                        </div>
                                        <div class="ml-4">
                                            <div class="text-sm font-bold text-gray-900 truncate w-48 lg:w-64"><a th:href="@{/books/{id}(id=${book.id})}" th:text="${book.title}" class="hover:text-primary">Title</a></div>
                                            <div class="text-sm text-gray-500 truncate w-48 lg:w-64" th:text="${book.author}">Author</div>
                                        </div>
                                    </div>
                                </td>
                                <td class="px-6 py-4 whitespace-nowrap">
                                    <div class="text-sm text-gray-900" th:text="${book.isbn}">ISBN</div>
                                    <div class="text-xs text-primary font-medium uppercase mt-1" th:text="${book.genre}">Genre</div>
                                </td>
                                <td class="px-6 py-4 whitespace-nowrap text-sm text-gray-900 font-bold" th:text="${'Rs. ' + #numbers.formatDecimal(book.price, 1, 2)}">
                                    Rs. 19.99
                                </td>
                                <td class="px-6 py-4 whitespace-nowrap">
                                    <span th:class="${book.stockQuantity < 5 ? 'px-2 py-1 inline-flex text-xs leading-5 font-semibold rounded-full bg-red-100 text-red-800' : 'px-2 py-1 inline-flex text-xs leading-5 font-semibold rounded-full bg-green-100 text-green-800'}" th:text="${book.stockQuantity}">
                                        10
                                    </span>
                                </td>
                                <td class="px-6 py-4 whitespace-nowrap text-right text-sm font-medium">
                                    <a th:href="@{/admin/books/edit/{id}(id=${book.id})}" class="text-blue-600 hover:text-blue-900 mr-3 px-2 py-1 bg-blue-50 rounded transition"><i class="fa-solid fa-pen-to-square"></i></a>
                                    <a th:href="@{/admin/books/delete/{id}(id=${book.id})}" class="text-red-600 hover:text-red-900 px-2 py-1 bg-red-50 rounded transition" onclick="return confirm('Are you sure you want to delete this book?');"><i class="fa-solid fa-trash-can"></i></a>
                                </td>
                            </tr>
                        </tbody>
                    </table>
                </div>
            </div>
        </div>
        <script th:if="${success}">
            document.addEventListener('DOMContentLoaded', function() {
                Swal.fire({
                    icon: 'success',
                    title: 'Success!',
                    text: '[[${success}]]',
                    timer: 3000,
                    showConfirmButton: false
                });
            });
        </script>
        <script th:if="${error}">
            document.addEventListener('DOMContentLoaded', function() {
                Swal.fire({
                    icon: 'error',
                    title: 'Error!',
                    text: '[[${error}]]',
                    timer: 3000,
                    showConfirmButton: false
                });
            });
        </script>
        </main>
    </div>
</body>
</html>
