<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org" th:replace="~{layout/base :: html(title='Manage Books', content=~{::content})}">
<body>
    <div th:fragment="content" class="flex min-h-[calc(100vh-76px)]">
        <aside th:replace="~{admin/layout :: sidebar}"></aside>
        <main class="flex-1 overflow-x-hidden px-5 py-10 md:px-10 lg:px-14">
            <div class="mx-auto max-w-7xl" data-aos="fade-up">
                <div class="flex flex-col justify-between gap-8 lg:flex-row lg:items-end">
                    <div>
                        <a th:href="@{/admin}" class="text-sm font-black uppercase tracking-[0.16em] text-[#716b61] transition hover:text-accent"><i class="fa-solid fa-arrow-left mr-2"></i>Dashboard</a>
                        <h1 class="editorial-heading mt-5">Book inventory.</h1>
                    </div>
                    <a th:href="@{/admin/books/add}" class="editorial-button"><i class="fa-solid fa-plus"></i> Add book</a>
                </div>

                <div class="mt-10 overflow-x-auto">
                    <table class="premium-table min-w-full">
                        <thead>
                            <tr>
                                <th class="text-left">Book</th>
                                <th class="text-left">ISBN / Genre</th>
                                <th class="text-left">Price</th>
                                <th class="text-left">Stock</th>
                                <th class="text-right">Actions</th>
                            </tr>
                        </thead>
                        <tbody>
                            <tr th:each="book : ${books}">
                                <td>
                                    <div class="flex items-center gap-4">
                                        <img class="h-20 w-14 object-cover shadow-lg" th:src="${book.coverUrl}" alt="" onerror="this.src='/images/book-placeholder.png'">
                                        <div class="min-w-0">
                                            <a th:href="@{/books/{id}(id=${book.id})}" th:text="${book.title}" class="block max-w-md truncate font-serif text-2xl font-black leading-none text-primary transition hover:text-accent">Title</a>
                                            <p class="mt-2 truncate text-sm font-semibold text-[#716b61]" th:text="${book.author}">Author</p>
                                        </div>
                                    </div>
                                </td>
                                <td>
                                    <p class="font-semibold text-primary" th:text="${book.isbn}">ISBN</p>
                                    <p class="mt-2 text-xs font-black uppercase tracking-[0.16em] text-accent" th:text="${book.genre}">Genre</p>
                                </td>
                                <td class="font-black text-primary" th:text="${'Rs. ' + #numbers.formatDecimal(book.price, 1, 2)}">Rs. 19.99</td>
                                <td>
                                    <span th:class="${book.stockQuantity < 5 ? 'status-badge text-red-700' : 'status-badge text-green-700'}" th:text="${book.stockQuantity}">10</span>
                                </td>
                                <td class="text-right">
                                    <a th:href="@{/admin/books/edit/{id}(id=${book.id})}" class="mr-2 inline-flex h-10 w-10 items-center justify-center border border-black/10 text-primary transition hover:border-accent hover:text-accent"><i class="fa-solid fa-pen-to-square"></i></a>
                                    <a th:href="@{/admin/books/delete/{id}(id=${book.id})}" class="inline-flex h-10 w-10 items-center justify-center border border-red-200 text-red-700 transition hover:bg-red-700 hover:text-white" onclick="return confirm('Are you sure you want to delete this book?');"><i class="fa-solid fa-trash-can"></i></a>
                                </td>
                            </tr>
                        </tbody>
                    </table>
                </div>
            </div>
            <script th:if="${success}">document.addEventListener('DOMContentLoaded', function(){ Swal.fire({icon:'success', title:'Success', text:'[[${success}]]', timer:3000, showConfirmButton:false}); });</script>
            <script th:if="${error}">document.addEventListener('DOMContentLoaded', function(){ Swal.fire({icon:'error', title:'Error', text:'[[${error}]]', timer:3000, showConfirmButton:false}); });</script>
        </main>
    </div>
</body>
</html>
