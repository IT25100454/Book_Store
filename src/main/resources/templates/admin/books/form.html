<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org" th:replace="~{layout/base :: html(title=${book.id == null ? 'Add Book' : 'Edit Book'}, content=~{::content})}">
<body>
    <div th:fragment="content" class="flex min-h-[calc(100vh-64px)] bg-gray-50">
        <aside th:replace="~{admin/layout :: sidebar}"></aside>
        <main class="flex-1 w-full overflow-x-hidden p-8">
            <div class="max-w-3xl mx-auto px-4 sm:px-6 lg:px-8" data-aos="fade-up">
            <div class="flex items-center gap-3 mb-8">
                <a th:href="@{/admin/books}" class="text-gray-400 hover:text-primary transition"><i class="fa-solid fa-arrow-left"></i></a>
                <h1 class="text-3xl font-extrabold text-gray-900" th:text="${book.id == null ? 'Add New Book' : 'Edit Book'}">Book Form</h1>
            </div>

            <div class="bg-white rounded-xl shadow-md border border-gray-100 p-8">
                <form th:action="@{/admin/books/save}" method="post" th:object="${book}">
                    <input type="hidden" th:field="*{id}">
                    <input type="hidden" th:field="*{createdAt}">
                    
                    <div class="grid grid-cols-1 md:grid-cols-2 gap-6 mb-6">
                        <div class="col-span-1 md:col-span-2">
                            <label class="block text-sm font-medium text-gray-700">Title</label>
                            <input type="text" th:field="*{title}" required class="mt-1 block w-full px-3 py-2 border border-gray-300 rounded-md shadow-sm focus:ring-primary focus:border-primary sm:text-sm">
                        </div>
                        
                        <div>
                            <label class="block text-sm font-medium text-gray-700">Author</label>
                            <input type="text" th:field="*{author}" required class="mt-1 block w-full px-3 py-2 border border-gray-300 rounded-md shadow-sm focus:ring-primary focus:border-primary sm:text-sm">
                        </div>
                        
                        <div>
                            <label class="block text-sm font-medium text-gray-700">ISBN</label>
                            <input type="text" th:field="*{isbn}" required class="mt-1 block w-full px-3 py-2 border border-gray-300 rounded-md shadow-sm focus:ring-primary focus:border-primary sm:text-sm">
                        </div>
                        
                        <div>
                            <label class="block text-sm font-medium text-gray-700">Genre</label>
                            <select th:field="*{genre}" class="mt-1 block w-full px-3 py-2 border border-gray-300 rounded-md shadow-sm focus:ring-primary focus:border-primary sm:text-sm">
                                <option value="Fiction">Fiction</option>
                                <option value="Non-Fiction">Non-Fiction</option>
                                <option value="Science">Science</option>
                                <option value="Technology">Technology</option>
                                <option value="Children">Children</option>
                            </select>
                        </div>
                        
                        <div>
                            <label class="block text-sm font-medium text-gray-700">Cover Image URL</label>
                            <input type="url" th:field="*{coverUrl}" required class="mt-1 block w-full px-3 py-2 border border-gray-300 rounded-md shadow-sm focus:ring-primary focus:border-primary sm:text-sm">
                            <p class="mt-1 text-xs text-gray-500">e.g. https://covers.openlibrary.org/b/isbn/[ISBN]-M.jpg</p>
                        </div>
                        
                        <div>
                            <label class="block text-sm font-medium text-gray-700">Price (Rs.)</label>
                            <input type="number" step="0.01" min="0" th:field="*{price}" required class="mt-1 block w-full px-3 py-2 border border-gray-300 rounded-md shadow-sm focus:ring-primary focus:border-primary sm:text-sm">
                        </div>
                        
                        <div>
                            <label class="block text-sm font-medium text-gray-700">Stock Quantity</label>
                            <input type="number" min="0" th:field="*{stockQuantity}" required class="mt-1 block w-full px-3 py-2 border border-gray-300 rounded-md shadow-sm focus:ring-primary focus:border-primary sm:text-sm">
                        </div>
                        
                        <div class="col-span-1 md:col-span-2">
                            <label class="block text-sm font-medium text-gray-700">Description</label>
                            <textarea th:field="*{description}" rows="4" required class="mt-1 block w-full px-3 py-2 border border-gray-300 rounded-md shadow-sm focus:ring-primary focus:border-primary sm:text-sm"></textarea>
                        </div>
                    </div>
                    
                    <div class="flex justify-end border-t pt-5">
                        <a th:href="@{/admin/books}" class="bg-white py-2 px-4 border border-gray-300 rounded-md shadow-sm text-sm font-medium text-gray-700 hover:bg-gray-50 focus:outline-none transition mr-3">
                            Cancel
                        </a>
                        <button type="submit" class="inline-flex justify-center py-2 px-4 border border-transparent shadow-sm text-sm font-medium rounded-md text-white bg-primary hover:bg-blue-700 focus:outline-none focus:ring-2 focus:ring-offset-2 focus:ring-primary transition">
                            Save Book
                        </button>
                    </div>
                </form>
            </div>
        </div>
        </main>
    </div>
</body>
</html>
