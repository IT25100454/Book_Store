<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org" th:replace="~{layout/base :: html(title='Theme Manager', content=~{::content})}">
<body>
    <div th:fragment="content" class="flex min-h-[calc(100vh-76px)]">
        <aside th:replace="~{admin/layout :: sidebar}"></aside>
        <main class="flex-1 overflow-x-hidden px-5 py-10 md:px-10 lg:px-14">
            <div class="mx-auto max-w-7xl" data-aos="fade-up">
                <a th:href="@{/admin}" class="text-sm font-black uppercase tracking-[0.16em] text-[#716b61] transition hover:text-accent"><i class="fa-solid fa-arrow-left mr-2"></i>Dashboard</a>
                <div class="mt-5 grid gap-8 lg:grid-cols-[0.9fr_1.1fr] lg:items-end">
                    <div>
                        <p class="section-kicker">Theme manager</p>
                        <h1 class="editorial-heading mt-6">Control the store atmosphere.</h1>
                    </div>
                    <p class="max-w-2xl text-lg leading-8 text-[#716b61]">
                        Themes apply globally across storefront, catalog, checkout, account pages, and admin screens for this session.
                    </p>
                </div>

                <form th:action="@{/admin/theme}" method="post" class="mt-12 grid gap-6 xl:grid-cols-3">
                    <label th:each="theme : ${themes}"
                           th:classappend="${activeTheme == theme.id() ? ' border-accent ring-4 ring-[rgba(159,107,62,0.16)]' : ''}"
                           class="theme-option editorial-card cursor-pointer p-6">
                        <input type="radio" name="theme" th:value="${theme.id()}" th:checked="${activeTheme == theme.id()}" class="sr-only">
                        <div th:class="${'theme-preview ' + theme.id()}">
                            <div class="theme-preview-nav"></div>
                            <div class="theme-preview-hero">
                                <div class="theme-preview-title"></div>
                                <div class="theme-preview-line"></div>
                                <div class="theme-preview-button"></div>
                            </div>
                            <div class="theme-preview-row">
                                <span></span>
                                <span></span>
                                <span></span>
                            </div>
                        </div>
                        <div class="mt-6 flex items-start justify-between gap-4">
                            <div>
                                <h2 class="font-serif text-3xl font-black leading-none text-primary" th:text="${theme.name()}">Theme name</h2>
                                <p class="mt-3 text-sm leading-6 text-[#716b61]" th:text="${theme.description()}">Theme description</p>
                            </div>
                            <span th:if="${activeTheme == theme.id()}" class="status-badge shrink-0 text-accent">Active</span>
                        </div>
                    </label>

                    <div class="xl:col-span-3">
                        <button type="submit" class="editorial-button"><i class="fa-solid fa-palette"></i> Apply selected theme</button>
                    </div>
                </form>
            </div>
            <script th:if="${success}">
                document.addEventListener('DOMContentLoaded', function() {
                    Swal.fire({ icon: 'success', title: 'Success', text: '[[${success}]]', timer: 2400, showConfirmButton: false });
                });
            </script>
        </main>
    </div>
</body>
</html>
