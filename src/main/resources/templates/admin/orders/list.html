<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org" th:replace="~{layout/base :: html(title='Manage Orders', content=~{::content})}">
<body>
    <div th:fragment="content" class="flex min-h-[calc(100vh-64px)] bg-gray-50">
        <aside th:replace="~{admin/layout :: sidebar}"></aside>
        <main class="flex-1 w-full overflow-x-hidden p-8">
            <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8" data-aos="fade-up">
            <div class="flex flex-col md:flex-row justify-between items-center mb-8 gap-4">
                <div class="flex items-center gap-3">
                    <a th:href="@{/admin}" class="text-gray-400 hover:text-primary transition"><i class="fa-solid fa-arrow-left"></i></a>
                    <h1 class="text-3xl font-extrabold text-gray-900">Manage Orders</h1>
                </div>
            </div>

            <div class="bg-white rounded-xl shadow border border-gray-100 overflow-hidden">
                <div class="overflow-x-auto">
                    <table class="min-w-full divide-y divide-gray-200">
                        <thead class="bg-gray-50">
                            <tr>
                                <th scope="col" class="px-6 py-3 text-left text-xs font-medium text-gray-500 uppercase tracking-wider">Order No. / Date</th>
                                <th scope="col" class="px-6 py-3 text-left text-xs font-medium text-gray-500 uppercase tracking-wider">Customer</th>
                                <th scope="col" class="px-6 py-3 text-left text-xs font-medium text-gray-500 uppercase tracking-wider">Total</th>
                                <th scope="col" class="px-6 py-3 text-left text-xs font-medium text-gray-500 uppercase tracking-wider">Status</th>
                                <th scope="col" class="px-6 py-3 text-right text-xs font-medium text-gray-500 uppercase tracking-wider">Action</th>
                            </tr>
                        </thead>
                        <tbody class="bg-white divide-y divide-gray-200">
                            <tr th:each="order : ${orders}" class="hover:bg-gray-50 transition">
                                <td class="px-6 py-4 whitespace-nowrap">
                                    <div class="text-sm font-bold text-gray-900" th:text="${order.orderNumber}">#123</div>
                                    <div class="text-xs text-gray-500" th:text="${#temporals.format(order.createdAt, 'MMM dd, yyyy HH:mm')}">Date</div>
                                </td>
                                <td class="px-6 py-4 whitespace-nowrap">
                                    <div class="text-sm text-gray-900 font-medium" th:text="${order.user.name}">Name</div>
                                    <div class="text-xs text-gray-500" th:text="${order.user.email}">Email</div>
                                </td>
                                <td class="px-6 py-4 whitespace-nowrap text-sm text-primary font-bold" th:text="${'Rs. ' + #numbers.formatDecimal(order.totalAmount, 1, 2)}">
                                    Rs. 19.99
                                </td>
                                <td class="px-6 py-4 whitespace-nowrap">
                                    <!-- Status Badge -->
                                    <span th:if="${order.status == 'Pending'}" class="inline-flex items-center px-2.5 py-0.5 rounded-full text-xs font-bold leading-4 bg-yellow-100 text-yellow-800">Pending</span>
                                    <span th:if="${order.status == 'Processing'}" class="inline-flex items-center px-2.5 py-0.5 rounded-full text-xs font-bold leading-4 bg-blue-100 text-blue-800">Processing</span>
                                    <span th:if="${order.status == 'Shipped'}" class="inline-flex items-center px-2.5 py-0.5 rounded-full text-xs font-bold leading-4 bg-purple-100 text-purple-800">Shipped</span>
                                    <span th:if="${order.status == 'Delivered'}" class="inline-flex items-center px-2.5 py-0.5 rounded-full text-xs font-bold leading-4 bg-green-100 text-green-800">Delivered</span>
                                    <span th:if="${order.status == 'Cancelled'}" class="inline-flex items-center px-2.5 py-0.5 rounded-full text-xs font-bold leading-4 bg-red-100 text-red-800">Cancelled</span>
                                </td>
                                <td class="px-6 py-4 whitespace-nowrap text-right text-sm font-medium">
                                    <form th:action="@{/admin/orders/update-status}" method="post" class="flex justify-end items-center space-x-2">
                                        <input type="hidden" name="orderId" th:value="${order.id}"/>
                                        <select name="status" class="border rounded px-2 py-1">
                                            <option th:each="status : ${statuses}"
                                                    th:value="${status}"
                                                    th:text="${status}"
                                                    th:selected="${status == order.status}">
                                            </option>
                                        </select>
                                        <button type="submit"
                                                class="bg-blue-600 text-white px-3 py-1 rounded hover:bg-blue-700">
                                            Update
                                        </button>
                                    </form>
                                </td>
                            </tr>
                        </tbody>
                    </table>
                </div>
            </div>
        </div>
        
        <script th:if="${success}">
            document.addEventListener('DOMContentLoaded', function() {
                Swal.fire({
                    icon: 'success',
                    title: 'Success!',
                    text: '[[${success}]]',
                    timer: 3000,
                    showConfirmButton: false
                });
            });
        </script>
        </main>
    </div>
</body>
</html>
