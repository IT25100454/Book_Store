<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org" th:replace="~{layout/base :: html(title=${author.id == null ? 'Add Author' : 'Edit Author'}, content=~{::content})}">
<body>
    <div th:fragment="content" class="flex min-h-[calc(100vh-76px)]">
        <aside th:replace="~{admin/layout :: sidebar}"></aside>
        <main class="flex-1 overflow-x-hidden px-5 py-10 md:px-10 lg:px-14">
            <div class="mx-auto max-w-5xl" data-aos="fade-up">
                <a th:href="@{/admin/authors}" class="text-sm font-black uppercase tracking-[0.16em] text-[#716b61] transition hover:text-accent"><i class="fa-solid fa-arrow-left mr-2"></i>Authors</a>
                <div class="mt-5 grid gap-8 lg:grid-cols-[0.8fr_1.2fr] lg:items-start">
                    <div>
                        <p class="section-kicker">Author editor</p>
                        <h1 class="editorial-heading mt-6" th:text="${author.id == null ? 'Add author.' : 'Edit author.'}">Author Form</h1>
                        <p class="mt-6 text-lg leading-8 text-[#716b61]">Keep author profiles complete so readers can discover the minds behind each work.</p>
                    </div>

                    <form th:action="@{/admin/authors/save}" method="post" th:object="${author}" class="glass-panel p-7">
                        <input type="hidden" th:field="*{id}">
                        <input type="hidden" th:field="*{createdAt}">

                        <div class="grid grid-cols-1 gap-6">
                            <div>
                                <label class="mb-2 block text-xs font-black uppercase tracking-[0.16em] text-[#716b61]">Name</label>
                                <input type="text" th:field="*{name}" required class="premium-input w-full px-4">
                            </div>
                            <div>
                                <label class="mb-2 block text-xs font-black uppercase tracking-[0.16em] text-[#716b61]">Nationality</label>
                                <input type="text" th:field="*{nationality}" required class="premium-input w-full px-4">
                            </div>
                            <div>
                                <label class="mb-2 block text-xs font-black uppercase tracking-[0.16em] text-[#716b61]">Photo URL</label>
                                <input type="url"  name="photoUrl" th:field="*{photoUrl}" required class="premium-input w-full px-4">
                            </div>
                            <div>
                                <label class="mb-2 block text-xs font-black uppercase tracking-[0.16em] text-[#716b61]">Biography</label>
                                <textarea th:field="*{bio}" rows="7" required class="premium-input w-full px-4 py-3"></textarea>
                            </div>
                        </div>

                        <div class="mt-8 flex flex-col gap-3 border-t border-black/10 pt-6 sm:flex-row sm:justify-end">
                            <a th:href="@{/admin/authors}" class="ghost-button editorial-button">Cancel</a>
                            <button type="submit" class="editorial-button">Save author</button>
                        </div>
                    </form>
                </div>
            </div>
        </main>
    </div>
</body>
</html>
