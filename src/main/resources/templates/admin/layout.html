<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<body>
    <aside th:fragment="sidebar" class="hidden min-h-screen w-72 shrink-0 border-r border-black/10 bg-primary text-white md:block">
        <div class="p-8">
            <p class="text-xs font-black uppercase tracking-[0.22em] text-white/45">PageTurner</p>
            <h2 class="mt-3 font-serif text-4xl font-black leading-none">Admin Studio</h2>
        </div>
        <nav class="px-5 pb-8">
            <a th:href="@{/admin}" class="mb-2 flex items-center gap-4 border border-white/10 px-5 py-4 text-sm font-black uppercase tracking-[0.12em] text-white transition hover:bg-white hover:text-primary">
                <i class="fa-solid fa-gauge w-5 text-center"></i> Dashboard
            </a>
            <a th:href="@{/admin/books}" class="mb-2 flex items-center gap-4 px-5 py-4 text-sm font-black uppercase tracking-[0.12em] text-white/70 transition hover:bg-white hover:text-primary">
                <i class="fa-solid fa-book w-5 text-center"></i> Books
            </a>
            <a th:href="@{/admin/orders}" class="mb-2 flex items-center gap-4 px-5 py-4 text-sm font-black uppercase tracking-[0.12em] text-white/70 transition hover:bg-white hover:text-primary">
                <i class="fa-solid fa-cart-shopping w-5 text-center"></i> Orders
            </a>
            <a th:href="@{/admin/users}" class="mb-2 flex items-center gap-4 px-5 py-4 text-sm font-black uppercase tracking-[0.12em] text-white/70 transition hover:bg-white hover:text-primary">
                <i class="fa-solid fa-users w-5 text-center"></i> Users
            </a>
        </nav>
    </aside>
</body>
</html>
