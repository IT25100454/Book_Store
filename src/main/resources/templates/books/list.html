<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org" th:replace="~{layout/base :: html(title='Browse Books', content=~{::content})}">
<body>
    <div th:fragment="content" class="editorial-shell py-16 lg:py-24">
        <section class="grid gap-10 lg:grid-cols-[0.95fr_1.05fr] lg:items-end" data-aos="fade-up">
            <div>
                <p class="section-kicker">Catalog</p>
                <h1 class="editorial-heading mt-6">
                    <span th:if="${selectedGenre}" th:text="${selectedGenre}"></span>
                    <span th:if="${searchQuery}" th:text="'Search: ' + ${searchQuery}"></span>
                    <span th:if="${selectedGenre == null and searchQuery == null}">All books</span>
                </h1>
            </div>
            <div class="glass-panel p-5">
                <form th:action="@{/books}" method="get" class="grid gap-3 md:grid-cols-[1fr_auto_auto]">
                    <div class="relative">
                        <input type="text" name="search" th:value="${searchQuery}" placeholder="Search title or author" class="premium-input w-full pl-11 pr-4">
                        <i class="fa-solid fa-magnifying-glass absolute left-4 top-1/2 -translate-y-1/2 text-[#716b61]"></i>
                    </div>
                    <select name="genre" class="premium-input min-w-44" onchange="this.form.submit()">
                        <option value="">All Genres</option>
                        <option th:each="g : ${allGenres}" th:value="${g}" th:text="${g}" th:selected="${selectedGenre == g}"></option>
                    </select>
                    <select name="sort" class="premium-input min-w-44" onchange="this.form.submit()">
                        <option value="">Sort By</option>
                        <option value="newest" th:selected="${sort == 'newest'}">Newest</option>
                        <option value="price_asc" th:selected="${sort == 'price_asc'}">Price low to high</option>
                        <option value="price_desc" th:selected="${sort == 'price_desc'}">Price high to low</option>
                        <option value="title" th:selected="${sort == 'title'}">Title A-Z</option>
                    </select>
                </form>
            </div>
        </section>

        <div th:if="${#lists.isEmpty(books)}" class="mt-16 border border-black/10 bg-paper p-16 text-center" data-aos="fade-up">
            <i class="fa-solid fa-book-open-reader text-5xl text-accent"></i>
            <h3 class="mt-8 font-serif text-5xl font-black text-primary">No matches found.</h3>
            <p class="mx-auto mt-4 max-w-md leading-7 text-[#716b61]">Try another title, author, or genre. The shelves are wider than this search.</p>
            <a th:href="@{/books}" class="editorial-button mt-8">Clear filters</a>
        </div>

        <section class="mt-20 lg:mt-24">
            <div class="grid gap-x-12 gap-y-20 md:grid-cols-2 xl:grid-cols-3">
                <article th:each="book, iterStat : ${books}" class="group grid gap-6 border-t border-black/10 pt-8 md:grid-cols-[170px_1fr]" data-aos="fade-up" th:attr="data-aos-delay=${(iterStat.index % 3) * 70}">
                    <a th:href="@{/books/{id}(id=${book.id})}" class="block bg-[#dccbb2] p-4">
                        <img th:src="${book.coverUrl}" alt="Book Cover" class="book-object aspect-[2/3] h-[255px] w-full object-cover" onerror="this.src='/images/book-placeholder.png'">
                    </a>
                    <div class="flex min-h-[255px] flex-col">
                        <p class="text-xs font-black uppercase tracking-[0.18em] text-accent" th:text="${book.genre}">Genre</p>
                        <h2 class="mt-4 font-serif text-3xl font-black leading-none text-primary">
                            <a th:href="@{/books/{id}(id=${book.id})}" class="transition hover:text-accent" th:text="${book.title}">Title</a>
                        </h2>
                        <p class="mt-3 text-sm font-semibold text-[#716b61]" th:text="${book.author}">Author</p>
                        <p class="mt-5 line-clamp-3 text-sm leading-6 text-[#5f584d]" th:text="${book.description}">Description</p>
                        <div class="mt-auto flex items-center justify-between gap-4 pt-6">
                            <span class="text-xl font-black text-primary" th:text="${'Rs. ' + #numbers.formatDecimal(book.price, 1, 2)}">Rs. 19.99</span>
                            <form th:action="@{/cart/add}" method="post">
                                <input type="hidden" name="bookId" th:value="${book.id}">
                                <input type="hidden" name="quantity" value="1">
                                <button type="submit" class="flex h-11 w-11 items-center justify-center border border-primary bg-primary text-white transition hover:border-accent hover:bg-accent disabled:cursor-not-allowed disabled:opacity-40" title="Add to Cart" th:disabled="${book.stockQuantity <= 0}">
                                    <i class="fa-solid fa-cart-plus"></i>
                                </button>
                            </form>
                        </div>
                    </div>
                </article>
            </div>
        </section>
    </div>
</body>
</html>
