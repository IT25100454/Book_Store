<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org" th:replace="~{layout/base :: html(title='Browse Books', content=~{::content})}">
<body>
    <div th:fragment="content" class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 py-10">
        <div class="flex flex-col md:flex-row justify-between items-start md:items-center mb-8 gap-4" data-aos="fade-up">
            <h1 class="text-3xl font-extrabold text-gray-900">
                <span th:if="${selectedGenre}" th:text="${selectedGenre} + ' Books'"></span>
                <span th:if="${searchQuery}" th:text="'Search Results for: ' + ${searchQuery}"></span>
                <span th:if="${selectedGenre == null and searchQuery == null}">All Books</span>
            </h1>

            <div class="flex flex-col sm:flex-row gap-4 w-full md:w-auto">
                <form th:action="@{/books}" method="get" class="flex relative w-full sm:w-64">
                    <input type="text" name="search" th:value="${searchQuery}" placeholder="Search titles or authors..." class="w-full pl-3 pr-10 py-2 border border-gray-300 rounded-md shadow-sm focus:ring-primary focus:border-primary">
                    <button type="submit" class="absolute inset-y-0 right-0 px-3 flex items-center text-gray-400 hover:text-primary">
                        <i class="fa-solid fa-magnifying-glass"></i>
                    </button>
                </form>

                <form th:action="@{/books}" method="get" class="flex flex-col sm:flex-row gap-4 w-full sm:w-auto">
                    <input type="hidden" name="search" th:if="${searchQuery}" th:value="${searchQuery}">
                    
                    <select name="genre" onchange="this.form.submit()" class="block w-full pl-3 pr-10 py-2 text-base border-gray-300 focus:outline-none focus:ring-primary focus:border-primary sm:text-sm rounded-md shadow-sm">
                        <option value="">All Genres</option>
                        <option th:each="g : ${allGenres}" th:value="${g}" th:text="${g}" th:selected="${selectedGenre == g}"></option>
                    </select>

                    <select name="sort" onchange="this.form.submit()" class="block w-full pl-3 pr-10 py-2 text-base border-gray-300 focus:outline-none focus:ring-primary focus:border-primary sm:text-sm rounded-md shadow-sm">
                        <option value="">Sort By</option>
                        <option value="newest" th:selected="${sort == 'newest'}">Newest Arrivals</option>
                        <option value="price_asc" th:selected="${sort == 'price_asc'}">Price: Low to High</option>
                        <option value="price_desc" th:selected="${sort == 'price_desc'}">Price: High to Low</option>
                        <option value="title" th:selected="${sort == 'title'}">Title: A-Z</option>
                    </select>
                </form>
            </div>
        </div>

        <!-- Book Grid -->
        <div th:if="${#lists.isEmpty(books)}" class="text-center py-20 bg-white rounded-xl shadow-sm border border-gray-100" data-aos="fade-up">
            <i class="fa-solid fa-book-open-reader text-6xl text-gray-300 mb-4"></i>
            <h3 class="text-xl font-medium text-gray-900">No books found</h3>
            <p class="text-gray-500 mt-2 mb-6">Try adjusting your search or filter to find what you're looking for.</p>
            <a th:href="@{/books}" class="text-primary hover:text-blue-800 font-medium bg-blue-50 px-6 py-2 rounded-full transition">Clear filters</a>
        </div>

        <div class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-4 gap-8">
            <!-- Book Card -->
            <div th:each="book, iterStat : ${books}" class="bg-white rounded-xl shadow-md overflow-hidden book-card group flex flex-col h-[400px]" data-aos="fade-up" th:attr="data-aos-delay=${(iterStat.index % 4) * 50}">
                <a th:href="@{/books/{id}(id=${book.id})}" class="block h-56 overflow-hidden relative border-b border-gray-100">
                    <img th:src="${book.coverUrl}" alt="Book Cover" class="w-full h-full object-cover group-hover:scale-105 transition duration-500" onerror="this.src='/images/book-placeholder.png'">
                    <div class="absolute inset-0 bg-black bg-opacity-0 group-hover:bg-opacity-20 transition duration-300"></div>
                </a>
                <div class="p-4 flex flex-col flex-grow">
                    <div class="text-[10px] font-semibold text-primary uppercase tracking-wider mb-1" th:text="${book.genre}">Genre</div>
                    <h3 class="text-base font-bold text-gray-900 mb-1 line-clamp-2">
                        <a th:href="@{/books/{id}(id=${book.id})}" class="hover:text-primary transition" th:text="${book.title}">Title</a>
                    </h3>
                    <p class="text-xs text-gray-600 mb-3 truncate flex-grow" th:text="${book.author}">Author</p>
                    <div class="flex justify-between items-center mt-auto pt-2 border-t border-gray-50">
                        <span class="text-lg font-bold text-gray-900" th:text="${'Rs. ' + #numbers.formatDecimal(book.price, 1, 2)}">Rs. 19.99</span>
                        <form th:action="@{/cart/add}" method="post">
                            <input type="hidden" name="bookId" th:value="${book.id}">
                            <input type="hidden" name="quantity" value="1">
                            <button type="submit" class="bg-gray-100 hover:bg-primary hover:text-white text-primary rounded-full w-8 h-8 flex items-center justify-center transition" title="Add to Cart" th:disabled="${book.stockQuantity <= 0}" th:classappend="${book.stockQuantity <= 0 ? 'opacity-50 cursor-not-allowed' : ''}">
                                <i class="fa-solid fa-cart-plus text-sm"></i>
                            </button>
                        </form>
                    </div>
                </div>
            </div>
        </div>
    </div>
</body>
</html>
