<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org" th:replace="~{layout/base :: html(title=${book.title}, content=~{::content})}">
<body>
    <div th:fragment="content">
        <section class="editorial-shell py-12 lg:py-20">
            <nav class="mb-12 text-sm font-bold uppercase tracking-[0.14em] text-[#716b61]" aria-label="Breadcrumb" data-aos="fade-in">
                <a th:href="@{/}" class="transition hover:text-accent">Home</a>
                <span class="mx-3">/</span>
                <a th:href="@{/books}" class="transition hover:text-accent">Catalog</a>
                <span class="mx-3">/</span>
                <a th:href="@{/books(genre=${book.genre})}" class="transition hover:text-accent" th:text="${book.genre}">Genre</a>
            </nav>

            <div class="grid gap-14 lg:grid-cols-[0.9fr_1.1fr] lg:items-start">
                <div class="sticky top-28" data-aos="fade-up">
                    <div class="bg-[#dccbb2] p-8 md:p-12">
                        <img th:src="${book.coverUrl}" alt="Cover" class="book-object mx-auto aspect-[2/3] max-h-[680px] w-full max-w-[430px] object-cover" onerror="this.src='/images/book-placeholder.png'">
                    </div>
                </div>

                <div data-aos="fade-up" data-aos-delay="100">
                    <p class="section-kicker" th:text="${book.genre}">Genre</p>
                    <h1 class="mt-7 font-serif text-5xl font-black leading-none text-primary md:text-7xl xl:text-8xl" th:text="${book.title}">Title</h1>
                    <p class="mt-7 text-2xl font-semibold text-[#5f584d]">by <span class="text-primary" th:text="${book.author}">Author</span></p>

                    <div class="my-10 grid gap-4 border-y border-black/10 py-7 sm:grid-cols-3">
                        <div>
                            <p class="text-xs font-black uppercase tracking-[0.18em] text-[#716b61]">Price</p>
                            <p class="mt-2 text-3xl font-black text-primary" th:text="${'Rs. ' + #numbers.formatDecimal(book.price, 1, 2)}">Rs. 19.99</p>
                        </div>
                        <div>
                            <p class="text-xs font-black uppercase tracking-[0.18em] text-[#716b61]">ISBN</p>
                            <p class="mt-3 break-words font-semibold text-primary" th:text="${book.isbn}">ISBN</p>
                        </div>
                        <div>
                            <p class="text-xs font-black uppercase tracking-[0.18em] text-[#716b61]">Availability</p>
                            <span th:if="${book.stockQuantity > 5}" class="status-badge mt-3 text-green-700">In Stock</span>
                            <span th:if="${book.stockQuantity > 0 and book.stockQuantity <= 5}" class="status-badge mt-3 text-amber-700" th:text="${'Only ' + book.stockQuantity + ' left'}">Low Stock</span>
                            <span th:if="${book.stockQuantity == 0}" class="status-badge mt-3 text-red-700">Out of Stock</span>
                        </div>
                    </div>

                    <div class="max-w-3xl">
                        <h2 class="font-serif text-4xl font-black text-primary">About this edition</h2>
                        <p class="mt-5 whitespace-pre-line break-words text-lg leading-9 text-[#5f584d]" th:text="${book.description}">Description text goes here...</p>
                    </div>

                    <form th:action="@{/cart/add}" method="post" class="glass-panel mt-12 grid gap-5 p-6 sm:grid-cols-[120px_1fr]">
                        <input type="hidden" name="bookId" th:value="${book.id}">
                        <div>
                            <label for="quantity" class="mb-2 block text-xs font-black uppercase tracking-[0.18em] text-[#716b61]">Qty</label>
                            <input type="number" id="quantity" name="quantity" value="1" min="1" th:max="${book.stockQuantity > 0 ? book.stockQuantity : 1}" class="premium-input w-full text-center text-lg font-black" th:disabled="${book.stockQuantity <= 0}">
                        </div>
                        <button type="submit" class="editorial-button w-full self-end disabled:cursor-not-allowed disabled:opacity-40" th:disabled="${book.stockQuantity <= 0}">
                            <i class="fa-solid fa-bag-shopping"></i> Add to cart
                        </button>
                    </form>
                </div>
            </div>
        </section>
    </div>
</body>
</html>
