<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org" th:replace="~{layout/base :: html(title='Home', content=~{::content})}">
<body>
    <div th:fragment="content">
        <!-- Hero Section -->
        <section class="bg-primary text-white py-20">
            <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 flex flex-col md:flex-row items-center">
                <div class="md:w-1/2" data-aos="fade-right">
                    <h1 class="text-4xl md:text-5xl font-extrabold tracking-tight mb-4">Discover Your Next Great Read</h1>
                    <p class="text-lg md:text-xl text-blue-100 mb-8">Join thousands of readers finding new worlds, ideas, and stories at PageTurner Bookstore.</p>
                    <a th:href="@{/books}" class="bg-accent hover:bg-green-500 text-white px-8 py-3 rounded-md font-bold text-lg transition shadow-lg inline-block">Browse Catalog</a>
                </div>
                <div class="md:w-1/2 mt-10 md:mt-0 flex justify-center" data-aos="fade-left">
                    <img src="https://images.unsplash.com/photo-1544947950-fa07a98d237f?auto=format&fit=crop&q=80&w=800&h=600" alt="Books" class="rounded-lg shadow-2xl object-cover h-64 md:h-96 w-full max-w-md">
                </div>
            </div>
        </section>

        <!-- Featured Genres -->
        <section class="py-16 bg-white">
            <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
                <h2 class="text-3xl font-bold text-gray-900 mb-8 text-center" data-aos="fade-up">Popular Genres</h2>
                <div class="grid grid-cols-2 md:grid-cols-5 gap-4">
                    <a th:href="@{/books(genre='Fiction')}" class="bg-blue-50 hover:bg-blue-100 rounded-lg p-6 text-center transition book-card" data-aos="fade-up" data-aos-delay="50">
                        <i class="fa-solid fa-masks-theater text-3xl text-primary mb-3"></i>
                        <h3 class="font-semibold text-gray-800">Fiction</h3>
                    </a>
                    <a th:href="@{/books(genre='Non-Fiction')}" class="bg-blue-50 hover:bg-blue-100 rounded-lg p-6 text-center transition book-card" data-aos="fade-up" data-aos-delay="100">
                        <i class="fa-solid fa-scale-balanced text-3xl text-primary mb-3"></i>
                        <h3 class="font-semibold text-gray-800">Non-Fiction</h3>
                    </a>
                    <a th:href="@{/books(genre='Science')}" class="bg-blue-50 hover:bg-blue-100 rounded-lg p-6 text-center transition book-card" data-aos="fade-up" data-aos-delay="150">
                        <i class="fa-solid fa-atom text-3xl text-primary mb-3"></i>
                        <h3 class="font-semibold text-gray-800">Science</h3>
                    </a>
                    <a th:href="@{/books(genre='Technology')}" class="bg-blue-50 hover:bg-blue-100 rounded-lg p-6 text-center transition book-card" data-aos="fade-up" data-aos-delay="200">
                        <i class="fa-solid fa-laptop-code text-3xl text-primary mb-3"></i>
                        <h3 class="font-semibold text-gray-800">Technology</h3>
                    </a>
                    <a th:href="@{/books(genre='Children')}" class="bg-blue-50 hover:bg-blue-100 rounded-lg p-6 text-center transition book-card" data-aos="fade-up" data-aos-delay="250">
                        <i class="fa-solid fa-child-reaching text-3xl text-primary mb-3"></i>
                        <h3 class="font-semibold text-gray-800">Children</h3>
                    </a>
                </div>
            </div>
        </section>

        <!-- New Arrivals -->
        <section class="py-16 bg-gray-50">
            <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
                <div class="flex justify-between items-center mb-8" data-aos="fade-up">
                    <h2 class="text-3xl font-bold text-gray-900">New Arrivals</h2>
                    <a th:href="@{/books(sort='newest')}" class="text-primary font-medium hover:underline">View All <i class="fa-solid fa-arrow-right ml-1"></i></a>
                </div>
                <div class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-4 gap-8">
                    <!-- Book Card -->
                    <div th:each="book, iterStat : ${newArrivals}" th:if="${iterStat.index < 4}" class="bg-white rounded-xl shadow-md overflow-hidden book-card group" data-aos="fade-up" th:attr="data-aos-delay=${iterStat.index * 100}">
                        <a th:href="@{/books/{id}(id=${book.id})}" class="block h-64 overflow-hidden relative">
                            <img th:src="${book.coverUrl}" alt="Book Cover" class="w-full h-full object-cover group-hover:scale-105 transition duration-500" onerror="this.src='/images/book-placeholder.png'">
                            <div class="absolute inset-0 bg-black bg-opacity-0 group-hover:bg-opacity-20 transition duration-300"></div>
                        </a>
                        <div class="p-5 flex flex-col h-[180px]">
                            <div class="text-xs font-semibold text-primary uppercase tracking-wider mb-1" th:text="${book.genre}">Genre</div>
                            <h3 class="text-lg font-bold text-gray-900 mb-1 truncate">
                                <a th:href="@{/books/{id}(id=${book.id})}" class="hover:text-primary transition" th:text="${book.title}">Book Title</a>
                            </h3>
                            <p class="text-sm text-gray-600 mb-3 flex-grow" th:text="${book.author}">Author Name</p>
                            <div class="flex justify-between items-center mt-auto">
                                <span class="text-xl font-bold text-gray-900" th:text="${'Rs. ' + #numbers.formatDecimal(book.price, 1, 2)}">Rs. 19.99</span>
                                <form th:action="@{/cart/add}" method="post">
                                    <input type="hidden" name="bookId" th:value="${book.id}">
                                    <input type="hidden" name="quantity" value="1">
                                    <button type="submit" class="bg-gray-100 hover:bg-primary hover:text-white text-primary rounded-full w-10 h-10 flex items-center justify-center transition" title="Add to Cart" th:disabled="${book.stockQuantity <= 0}" th:classappend="${book.stockQuantity <= 0 ? 'opacity-50 cursor-not-allowed' : ''}">
                                        <i class="fa-solid fa-cart-plus"></i>
                                    </button>
                                </form>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </section>
        
        <script th:if="${success}">
            document.addEventListener('DOMContentLoaded', function() {
                Swal.fire({
                    icon: 'success',
                    title: 'Success!',
                    text: '[[${success}]]',
                    timer: 3000,
                    showConfirmButton: false
                });
            });
        </script>
    </div>
</body>
</html>
