<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org"
      th:replace="~{layout/base :: html(title='My Feedback', content=~{::content})}">
<body>
<div th:fragment="content">

    <section class="editorial-shell py-16 lg:py-20">
        <div class="flex flex-col gap-6 sm:flex-row sm:items-end sm:justify-between" data-aos="fade-up">
            <div>
                <p class="section-kicker">Your voice</p>
                <h1 class="editorial-heading mt-6">My feedback.</h1>
            </div>
            <a th:href="@{/feedback/submit}" class="editorial-button self-start px-8">
                New feedback <i class="fa-solid fa-plus ml-1"></i>
            </a>
        </div>
    </section>

    <section class="editorial-shell pb-28 lg:pb-36">

        <!-- Empty state -->
        <div th:if="${#lists.isEmpty(feedbacks)}" class="py-20 text-center" data-aos="fade-up">
            <i class="fa-regular fa-comment-dots text-5xl text-black/15"></i>
            <p class="mt-6 font-serif text-3xl font-black text-primary">Nothing here yet.</p>
            <p class="mt-3 text-[#716b61]">Share a thought, review, or suggestion with us.</p>
            <a th:href="@{/feedback/submit}" class="editorial-button mt-8 inline-flex px-8">Submit feedback</a>
        </div>

        <!-- Feedback list -->
        <div th:unless="${#lists.isEmpty(feedbacks)}" class="space-y-6">
            <article th:each="fb, iterStat : ${feedbacks}"
                     class="group border border-black/10 bg-[rgba(251,248,241,0.68)] p-8 transition hover:border-[rgba(159,107,62,0.35)] hover:bg-[rgba(255,252,246,0.92)]"
                     data-aos="fade-up" th:attr="data-aos-delay=${iterStat.index * 60}">

                <div class="flex flex-wrap items-start justify-between gap-4">
                    <div class="flex flex-wrap items-center gap-3">
                        <!-- Type badge -->
                        <span class="status-badge border-[rgba(159,107,62,0.4)] text-accent text-[10px]"
                              th:text="${fb.type.name().replace('_',' ')}">TYPE</span>
                        <!-- Status badge -->
                        <span th:class="${'status-badge text-[10px] ' +
                            (fb.status.name() == 'PENDING'   ? 'border-yellow-500/40 text-yellow-700' :
                             fb.status.name() == 'REVIEWED'  ? 'border-blue-500/40 text-blue-700' :
                             fb.status.name() == 'RESOLVED'  ? 'border-green-600/40 text-green-700' :
                             'border-black/20 text-[#716b61]')}"
                              th:text="${fb.status.name()}">STATUS</span>
                        <!-- Rating stars -->
                        <span th:if="${fb.rating != null}" class="flex items-center gap-0.5">
                            <i th:each="s : ${#numbers.sequence(1,5)}"
                               th:class="${'fa-star text-xs ' + (s <= fb.rating ? 'fa-solid text-[#9f6b3e]' : 'fa-regular text-black/20')}"></i>
                        </span>
                    </div>
                    <time class="text-xs font-semibold text-[#716b61]"
                          th:text="${#temporals.format(fb.createdAt, 'dd MMM yyyy')}">01 Jan 2025</time>
                </div>

                <h3 class="mt-5 font-serif text-2xl font-black leading-tight text-primary" th:text="${fb.subject}">Subject</h3>
                <p class="mt-3 text-sm leading-7 text-[#5f584d]" th:text="${fb.message}">Message</p>

                <!-- Admin reply -->
                <div th:if="${fb.adminReply != null}"
                     class="mt-6 border-l-2 border-[#9f6b3e] pl-5">
                    <p class="text-xs font-black uppercase tracking-[0.16em] text-accent">PageTurner replied</p>
                    <p class="mt-2 text-sm leading-7 text-[#5f584d]" th:text="${fb.adminReply}">Reply</p>
                    <time class="mt-1 block text-xs text-[#716b61]"
                          th:text="${#temporals.format(fb.repliedAt, 'dd MMM yyyy')}">01 Jan 2025</time>
                </div>

            </article>
        </div>

    </section>

</div>
</body>
</html>
