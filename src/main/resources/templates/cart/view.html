<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org" th:replace="~{layout/base :: html(title='Shopping Cart', content=~{::content})}">
<body>
    <div th:fragment="content" class="editorial-shell py-16 lg:py-24">
        <div data-aos="fade-up">
            <p class="section-kicker">Cart</p>
            <h1 class="editorial-heading mt-6">Your current stack.</h1>
        </div>

        <div th:if="${#lists.isEmpty(cart)}" class="mt-12 border border-black/10 bg-paper p-16 text-center" data-aos="fade-up">
            <i class="fa-solid fa-bag-shopping text-5xl text-accent"></i>
            <h3 class="mt-8 font-serif text-5xl font-black text-primary">The stack is empty.</h3>
            <p class="mx-auto mt-4 max-w-md leading-7 text-[#716b61]">Start with one strong book and build from there.</p>
            <a th:href="@{/books}" class="editorial-button mt-8">Continue shopping</a>
        </div>

        <div th:if="${not #lists.isEmpty(cart)}" class="mt-12 grid gap-10 lg:grid-cols-[1fr_390px]" data-aos="fade-up">
            <div class="space-y-6">
                <article th:each="item : ${cart}" class="grid gap-6 border-t border-black/10 pt-6 sm:grid-cols-[120px_1fr]">
                    <img th:src="${item.book.coverUrl}" alt="Cover" class="book-object h-44 w-28 object-cover" onerror="this.src='/images/book-placeholder.png'">
                    <div class="flex flex-col gap-6">
                        <div class="flex items-start justify-between gap-6">
                            <div>
                                <h2 class="font-serif text-3xl font-black leading-none text-primary">
                                    <a th:href="@{/books/{id}(id=${item.book.id})}" class="transition hover:text-accent" th:text="${item.book.title}">Title</a>
                                </h2>
                                <p class="mt-3 font-semibold text-[#716b61]" th:text="${item.book.author}">Author</p>
                                <p class="mt-3 font-black text-primary" th:text="${'Rs. ' + #numbers.formatDecimal(item.book.price, 1, 2)}">Rs. 19.99</p>
                            </div>
                            <form th:action="@{/cart/remove}" method="post">
                                <input type="hidden" name="bookId" th:value="${item.book.id}">
                                <button type="submit" class="flex h-11 w-11 items-center justify-center border border-red-200 text-red-700 transition hover:bg-red-700 hover:text-white" title="Remove item">
                                    <i class="fa-solid fa-trash-can"></i>
                                </button>
                            </form>
                        </div>
                        <div class="flex flex-wrap items-center justify-between gap-4">
                            <form th:action="@{/cart/update}" method="post" class="flex items-center gap-3">
                                <input type="hidden" name="bookId" th:value="${item.book.id}">
                                <label class="text-xs font-black uppercase tracking-[0.16em] text-[#716b61]" for="quantity">Qty</label>
                                <select id="quantity" name="quantity" onchange="this.form.submit()" class="premium-input w-24 px-3">
                                    <option th:each="i : ${#numbers.sequence(1, item.book.stockQuantity)}" th:value="${i}" th:text="${i}" th:selected="${i == item.quantity}"></option>
                                </select>
                            </form>
                            <div class="text-right">
                                <p class="text-xs font-black uppercase tracking-[0.16em] text-[#716b61]">Subtotal</p>
                                <p class="mt-1 text-2xl font-black text-primary" th:text="${'Rs. ' + #numbers.formatDecimal(item.book.price * item.quantity, 1, 2)}">Rs. 19.99</p>
                            </div>
                        </div>
                    </div>
                </article>
            </div>

            <aside class="glass-panel h-fit p-7 lg:sticky lg:top-28">
                <h2 class="font-serif text-4xl font-black text-primary">Order summary</h2>
                <div class="mt-7 space-y-5 border-y border-black/10 py-6">
                    <div class="flex justify-between text-[#716b61]">
                        <span>Subtotal</span>
                        <span class="font-bold text-primary" th:text="${'Rs. ' + #numbers.formatDecimal(total, 1, 2)}">Rs. 0.00</span>
                    </div>
                    <div class="flex justify-between text-[#716b61]">
                        <span>Shipping</span>
                        <span class="font-bold text-green-700">Free</span>
                    </div>
                    <div class="flex justify-between pt-2">
                        <span class="font-black text-primary">Total</span>
                        <span class="text-3xl font-black text-primary" th:text="${'Rs. ' + #numbers.formatDecimal(total, 1, 2)}">Rs. 0.00</span>
                    </div>
                </div>
                <a th:href="@{/checkout}" class="editorial-button mt-7 w-full">Proceed to checkout <i class="fa-solid fa-arrow-right"></i></a>
                <a th:href="@{/books}" class="mt-4 block text-center text-sm font-black uppercase tracking-[0.14em] text-[#716b61] transition hover:text-accent">Continue shopping</a>
            </aside>
        </div>
    </div>
</body>
</html>
