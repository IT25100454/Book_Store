<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org" th:replace="~{layout/base :: html(title='My Notifications', content=~{::content})}">
<body>
    <div th:fragment="content" class="editorial-shell py-16 lg:py-24">
        <div class="flex flex-col justify-between gap-8 md:flex-row md:items-end" data-aos="fade-up">
            <div>
                <p class="section-kicker">Account activity</p>
                <h1 class="editorial-heading mt-6">Notifications.</h1>
            </div>
            <button th:if="${not #lists.isEmpty(notifications)}" onclick="window.location.reload()" class="ghost-button editorial-button">
                <i class="fa-solid fa-circle-check"></i> Mark read
            </button>
        </div>

        <div th:if="${#lists.isEmpty(notifications)}" class="mt-12 border border-black/10 bg-paper p-16 text-center" data-aos="fade-up">
            <i class="fa-solid fa-bell-slash text-5xl text-accent"></i>
            <h3 class="mt-8 font-serif text-5xl font-black text-primary">All quiet.</h3>
            <p class="mx-auto mt-4 max-w-md leading-7 text-[#716b61]">Important order and account updates will appear here.</p>
            <a th:href="@{/books}" class="editorial-button mt-8">Browse books</a>
        </div>

        <div class="mt-12 space-y-5">
            <article th:each="n : ${notifications}" class="editorial-card p-6" th:classappend="${n.isRead ? ' opacity-70' : ' border-accent'}" data-aos="fade-up">
                <div class="grid gap-5 md:grid-cols-[64px_1fr_auto] md:items-start">
                    <div class="flex h-16 w-16 items-center justify-center border border-black/10 bg-paper text-2xl text-accent">
                        <i th:class="${n.type == 'NEW_ORDER' ? 'fa-solid fa-shopping-bag' : n.type == 'ORDER_STATUS' ? 'fa-solid fa-truck' : n.type == 'LOW_STOCK' ? 'fa-solid fa-triangle-exclamation' : 'fa-solid fa-star'}"></i>
                    </div>
                    <div>
                        <h2 class="font-serif text-3xl font-black leading-none text-primary" th:text="${n.title}">Notification Title</h2>
                        <p class="mt-3 leading-7 text-[#5f584d]" th:text="${n.message}">Notification message content.</p>
                        <a th:href="@{${n.link}}" class="mt-5 inline-flex text-sm font-black uppercase tracking-[0.14em] text-accent transition hover:text-primary">View details <i class="fa-solid fa-arrow-right ml-2"></i></a>
                    </div>
                    <time class="text-xs font-black uppercase tracking-[0.16em] text-[#716b61]" th:text="${#temporals.format(n.createdAt, 'MMM dd, HH:mm')}">Feb 12</time>
                </div>
            </article>
        </div>
    </div>
</body>
</html>
