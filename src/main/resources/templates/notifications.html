<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org" th:replace="~{layout/base :: html(title='My Notifications', content=~{::content})}">
<body>
    <div th:fragment="content" class="bg-gray-50 min-h-[calc(100vh-140px)] py-12">
        <div class="max-w-4xl mx-auto px-4 sm:px-6 lg:px-8">
            
            <div class="flex items-center justify-between mb-8">
                <div>
                    <h1 class="text-3xl font-extrabold text-gray-900 tracking-tight">Notifications</h1>
                    <p class="mt-2 text-gray-500">Stay updated with your orders and account activity.</p>
                </div>
                <div th:if="${not #lists.isEmpty(notifications)}">
                    <button onclick="window.location.reload()" class="inline-flex items-center px-4 py-2 border border-transparent text-sm font-medium rounded-md text-primary bg-blue-50 hover:bg-blue-100 transition">
                        <i class="fa-solid fa-circle-check mr-2"></i> Mark all as read
                    </button>
                </div>
            </div>

            <!-- Empty State -->
            <div th:if="${#lists.isEmpty(notifications)}" 
                 class="bg-white rounded-2xl shadow-sm border border-gray-100 p-16 text-center"
                 data-aos="zoom-in">
                <div class="w-24 h-24 bg-blue-50 text-primary rounded-full flex items-center justify-center mx-auto mb-6 text-4xl">
                    <i class="fa-solid fa-bell-slash"></i>
                </div>
                <h3 class="text-xl font-bold text-gray-900">You're all caught up!</h3>
                <p class="text-gray-500 mt-2 max-w-xs mx-auto">When important events happen, you'll find them right here.</p>
                <a th:href="@{/books}" class="mt-8 inline-flex items-center text-primary font-bold hover:underline">
                    Find your next favorite book <i class="fa-solid fa-arrow-right ml-2"></i>
                </a>
            </div>

            <!-- Notifications List -->
            <div class="space-y-4">
                <div th:each="n : ${notifications}" 
                     class="bg-white rounded-xl shadow-sm border-l-4 overflow-hidden transition hover:shadow-md"
                     th:classappend="${n.isRead ? 'border-gray-200 opacity-75' : 'border-primary shadow-md'}"
                     data-aos="fade-up">
                    <div class="p-5 flex gap-5">
                        <div class="flex-shrink-0">
                            <div class="w-12 h-12 rounded-full flex items-center justify-center text-xl"
                                 th:classappend="${
                                    n.type == 'NEW_ORDER' ? 'bg-green-100 text-green-600' :
                                    n.type == 'ORDER_STATUS' ? 'bg-blue-100 text-blue-600' :
                                    n.type == 'LOW_STOCK' ? 'bg-red-100 text-red-600' :
                                    'bg-purple-100 text-purple-600'
                                 }">
                                <i th:class="${
                                    n.type == 'NEW_ORDER' ? 'fa-solid fa-shopping-bag' :
                                    n.type == 'ORDER_STATUS' ? 'fa-solid fa-truck' :
                                    n.type == 'LOW_STOCK' ? 'fa-solid fa-triangle-exclamation' :
                                    'fa-solid fa-star'
                                }"></i>
                            </div>
                        </div>
                        <div class="flex-grow">
                            <div class="flex items-start justify-between">
                                <h3 class="font-bold text-gray-900 text-lg" th:text="${n.title}">Notification Title</h3>
                                <span class="text-xs text-gray-400 font-medium" th:text="${#temporals.format(n.createdAt, 'MMM dd, HH:mm')}">Feb 12, 14:30</span>
                            </div>
                            <p class="text-gray-600 mt-1 leading-relaxed" th:text="${n.message}">This is the notification message content.</p>
                            <div class="mt-4 flex items-center gap-4">
                                <a th:href="@{${n.link}}" class="text-sm font-bold text-primary hover:text-blue-800 transition">View Details &rarr;</a>
                                <span th:if="${!n.isRead}" class="h-2 w-2 bg-primary rounded-full"></span>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
            
        </div>
    </div>
</body>
</html>
